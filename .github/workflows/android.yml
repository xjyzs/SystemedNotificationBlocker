name: Build and Publish Release APK

on:
  workflow_dispatch:
  push:

jobs:
  build-variant:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - { flavor: "x86", task: "assembleX86Release" }
          - { flavor: "x86_64", task: "assembleX86_64Release" }
          - { flavor: "arm", task: "assembleArmRelease" }
          - { flavor: "arm64Minsdk35", task: "assembleArm64Minsdk35Release" }
          - { flavor: "arm64Minsdk29", task: "assembleArm64Minsdk29Release" }
          - { flavor: "arm64Minsdk26", task: "assembleArm64Minsdk26Release" }
          - { flavor: "universal", task: "assembleUniversalRelease" }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant Gradle permission
        run: chmod +x ./gradlew

      - name: Build Release APK (${{ matrix.variant.flavor }})
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$secrets.RELEASE_SIGNING_KEY" ]; then
            echo "$secrets.RELEASE_SIGNING_KEY" | base64 --decode > keystore.jks
          else
            touch keystore.jks
          fi
          ./gradlew ${{ matrix.variant.task }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.variant.flavor }}
          path: app/build/outputs/apk/${{ matrix.variant.flavor }}/release/*.apk

  publish-release:
    needs: build-variant
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          pattern: apk-*
          path: apks
          merge-multiple: true

      - name: Extract version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*\"\K[^"]+' app/build.gradle.kts | head -1)
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          body: ${{ github.event.head_commit.message }}
          files: apks/*.apk